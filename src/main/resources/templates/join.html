<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<body>
	<div layout:fragment="content">
		
		<h1 class="pageTitle">회원가입</h1>
		
		<div>
			<div th:if="${errorMsg}" class="message error" th:text="${errorMsg}"></div>
			<form th:action="@{/join}" th:object="${user}" method="post">
				<div class="form_item">
					<label>이름</label>
					<input type="text" th:field="*{userName}" placeholder="이름" required>
				</div>
				<div class="form_item">
					<label>아이디</label>
					<input type="text" th:field="*{loginId}" placeholder="아이디" required>
				</div>
				<div class="form_item">
					<label>비밀번호</label>
					<input type="password" th:field="*{password}" placeholder="비밀번호" required>
				</div>
				<div class="form_item">
					<label>비밀번호 확인</label>
					<input type="password" th:field="*{passwordConfirm}" placeholder="비밀번호 확인" required>
				</div>
				<div class="form_btn">
					<button type="submit" class="btn_submit">회원가입</button>
				</div>
			</form>
		</div>
		
		
	</div>
</body>
</html>
