<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<body>
	<div layout:fragment="content">
		<h1 class="pageTitle">로그인</h1>
		
		<!-- 에러 메시지 -->
        <div th:if="${errorMsg}" class="message error" th:text="${errorMsg}"></div>
        
        <!-- 로그아웃 메시지 -->
        <div th:if="${logoutMsg}" class="message success" th:text="${logoutMsg}"></div>
        
		<div class="">
			<form th:action="@{/login}" method="post">
	            <div class="form_item">
	                <label for="username">아이디</label>
	                <input type="text" 
	                       id="username" 
	                       name="username" 
	                       placeholder="아이디 입력" 
	                       required 
	                       autofocus>
	            </div>
	            
	            <div class="form_item">
	                <label for="password">비밀번호</label>
	                <input type="password" 
	                       id="password" 
	                       name="password" 
	                       placeholder="비밀번호 입력" 
	                       required>
	            </div>
	            <div class="form_btn">
		            <button type="submit" class="btn_submit">로그인</button>
	            </div>
	        </form>
		</div>
		
	</div>
</body>
</html>
